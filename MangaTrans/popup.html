<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Translator AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <div class="logo-glow"></div>
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 18H11V16H13V18ZM13 14H11V8H13V14Z" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#c084fc"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="title">Manga Trans <span class="gradient-text">AI</span></h1>
      </div>
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span class="status-text">Đang chạy</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <!-- API Key Section -->
      <div class="input-group">
        <label for="apiKey" class="label">Gemini API Key</label>
        <div class="input-wrapper">
          <input type="password" id="apiKey" placeholder="Nhập Gemini API Key..." />
          <button type="button" id="toggleApiKey" class="input-btn" title="Hiện/Ẩn Key">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <p class="help-text">Lấy key miễn phí tại <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a>.</p>
      </div>

      <!-- Config Grid -->
      <div class="config-grid">
        <div class="input-group">
          <label for="model" class="label">Model AI</label>
          <select id="model">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (Nhanh & Tốt)</option>
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Ổn định)</option>
          </select>
        </div>

        <div class="lang-row">
          <div class="input-group half">
            <label for="sourceLang" class="label">Nguồn</label>
            <select id="sourceLang">
              <option value="Auto">Tự phát hiện</option>
              <option value="Japanese">Tiếng Nhật</option>
              <option value="English">Tiếng Anh</option>
              <option value="Chinese">Tiếng Trung</option>
              <option value="Korean">Tiếng Hàn</option>
            </select>
          </div>
          <div class="input-group half">
            <label for="targetLang" class="label">Đích</label>
            <select id="targetLang">
              <option value="Vietnamese">Tiếng Việt</option>
              <option value="English">Tiếng Anh</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Advanced Style Accordion Header -->
      <details class="advanced-section">
        <summary class="advanced-summary">Tùy chỉnh kiểu chữ dịch</summary>
        <div class="advanced-content">
          <div class="input-group">
            <label for="fontFamily" class="label">Phông chữ</label>
            <select id="fontFamily">
              <option value="Comic Sans MS, sans-serif">Comic Sans (Khuyên dùng)</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="system-ui, sans-serif">Hệ thống</option>
            </select>
          </div>

          <div class="input-group">
            <div class="slider-label-row">
              <label for="bubbleOpacity" class="label">Độ mờ nền bong bóng</label>
              <span id="bubbleOpacityVal" class="value-badge">100%</span>
            </div>
            <input type="range" id="bubbleOpacity" min="0" max="1" step="0.1" value="1.0" />
          </div>
        </div>
      </details>

      <!-- Main Action Button -->
      <button type="button" id="startCapture" class="primary-btn">
        <svg class="scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-2-2h-5l-2-3H5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"></path>
          <polyline points="12 11 12 17 9 14 12 11 15 14"></polyline>
        </svg>
        <span>Bắt đầu khoanh vùng dịch</span>
      </button>

      <!-- Saved Info Toast (hidden by default) -->
      <div id="statusMsg" class="status-msg">Cấu hình đã lưu tự động!</div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="shortcut-box">
        <span class="keyboard-key">Alt</span> + <span class="keyboard-key">Shift</span> + <span class="keyboard-key">S</span>
        <span class="shortcut-text">để chụp nhanh</span>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
